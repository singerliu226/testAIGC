<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>论文盾 - 管理员面板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#4f46e5;--pri-h:#4338ca;--pri-l:#eef2ff;
  --ok:#059669;--ok-bg:#ecfdf5;
  --warn:#d97706;--warn-bg:#fffbeb;
  --err:#dc2626;--err-bg:#fef2f2;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --font-sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
body{font-family:var(--font-sans);background:var(--g50);color:var(--g900);line-height:1.6;min-height:100vh}
.header{background:white;border-bottom:1px solid var(--g200);padding:0 24px;position:sticky;top:0;z-index:50}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;color:var(--pri);text-decoration:none}
.back-link{font-size:13px;color:var(--g500);text-decoration:none;border:1px solid var(--g200);padding:4px 12px;border-radius:6px;transition:.15s}
.back-link:hover{border-color:var(--pri);color:var(--pri)}

.container{max-width:900px;margin:0 auto;padding:24px}
.card{background:white;border:1px solid var(--g200);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--g100);font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}

/* 登录表单 */
.login-wrap{max-width:360px;margin:80px auto;text-align:center}
.login-wrap h2{margin-bottom:16px;font-size:20px}
.login-wrap input{width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;transition:.15s}
.login-wrap input:focus{border-color:var(--pri)}
.login-wrap .btn{width:100%}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--pri);color:white}
.btn-primary:hover{background:var(--pri-h)}
.btn-outline{background:white;color:var(--g700);border:1px solid var(--g200)}
.btn-outline:hover{border-color:var(--pri);color:var(--pri)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-ok{background:var(--ok);color:white}
.btn-ok:hover{background:#047857}

/* 表格 */
.acc-table{width:100%;border-collapse:collapse;font-size:13px}
.acc-table th{text-align:left;padding:10px 12px;background:var(--g50);color:var(--g500);font-size:12px;font-weight:500;border-bottom:1px solid var(--g200)}
.acc-table td{padding:10px 12px;border-bottom:1px solid var(--g100)}
.acc-table tr:hover td{background:var(--g50)}
.balance-num{font-family:var(--font-mono);font-weight:600;font-size:14px}
.topup-input{width:80px;padding:4px 8px;border:1px solid var(--g200);border-radius:6px;font-size:13px;text-align:center;font-family:var(--font-mono);outline:none}
.topup-input:focus{border-color:var(--pri)}

.empty{text-align:center;color:var(--g400);padding:40px 20px;font-size:14px}

.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15);pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-ok{background:var(--ok);color:white}
.toast-err{background:var(--err);color:white}

.stat-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;background:white;border:1px solid var(--g200);border-radius:var(--radius);padding:16px 20px}
.stat-card .label{font-size:12px;color:var(--g500);margin-bottom:4px}
.stat-card .value{font-size:24px;font-weight:700;font-family:var(--font-mono);color:var(--g900)}

/* 兑换码生成区 */
.pkg-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pkg-btn{flex:1;min-width:120px;padding:12px 8px;border:2px solid var(--g200);border-radius:10px;background:white;cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.pkg-btn:hover,.pkg-btn.sel{border-color:var(--pri);background:var(--pri-l)}
.pkg-btn .pb-name{font-size:12px;color:var(--g500);margin-bottom:2px}
.pkg-btn .pb-price{font-size:16px;font-weight:800;color:var(--g900)}
.pkg-btn .pb-pts{font-size:11px;color:var(--pri);font-weight:600;margin-top:2px}
.gen-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:8px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;color:var(--g500);font-weight:500}
.form-input{padding:8px 12px;border:1px solid var(--g200);border-radius:8px;font-size:13px;font-family:var(--font-mono);outline:none;transition:.15s;width:80px;text-align:center}
.form-input:focus{border-color:var(--pri)}
.code-output{background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:12px 14px;font-family:var(--font-mono);font-size:13px;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.8;display:none;margin-top:12px}
.code-output.show{display:block}
/* 兑换码列表 */
.code-table{width:100%;border-collapse:collapse;font-size:12px}
.code-table th{text-align:left;padding:8px 10px;background:var(--g50);color:var(--g500);font-size:11px;font-weight:600;border-bottom:1px solid var(--g200)}
.code-table td{padding:7px 10px;border-bottom:1px solid var(--g100);font-family:var(--font-mono)}
.code-table tr:hover td{background:var(--g50)}
.pill-used{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;font-family:var(--font-sans)}
.pill-used.yes{background:#fef2f2;color:var(--err)}
.pill-used.no{background:#ecfdf5;color:var(--ok)}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--g200);margin-bottom:0}
.tab-item{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;border-left:none;border-right:none;border-top:none;background:transparent;color:var(--g500);transition:.15s;font-family:inherit}
.tab-item.active{color:var(--pri);border-color:var(--pri)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* 审计日志 */
.audit-table{width:100%;border-collapse:collapse;font-size:12px}
.audit-table th{text-align:left;padding:8px 10px;background:var(--g50);color:var(--g500);font-size:11px;font-weight:600;border-bottom:1px solid var(--g200)}
.audit-table td{padding:7px 10px;border-bottom:1px solid var(--g100);font-family:var(--font-mono);color:var(--g700)}
.audit-table td.action{font-family:var(--font-sans);font-weight:600}
.audit-badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;font-family:var(--font-sans)}
.badge-ok{background:#ecfdf5;color:#059669}.badge-err{background:#fef2f2;color:#dc2626}
.badge-warn{background:#fffbeb;color:#d97706}.badge-info{background:#eff6ff;color:#2563eb}
/* 会话状态栏 */
.session-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px;background:var(--g50);border-bottom:1px solid var(--g200);font-size:12px;color:var(--g500)}
.session-bar strong{color:var(--g900)}.session-bar .timeout-warn{color:var(--warn);font-weight:600}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <span class="brand">
      <svg viewBox="0 0 28 28" width="28" height="28" fill="none"><circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/><path d="M9 14.5l3 3 7-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      论文盾 · 管理员
    </span>
    <a class="back-link" href="/">← 返回主页</a>
  </div>
</header>

<!-- 登录 -->
<div class="login-wrap" id="loginWrap">
  <h2>管理员登录</h2>
  <p style="color:var(--g500);font-size:13px;margin-bottom:20px">请输入管理员密钥以继续</p>
  <input type="password" id="secretInput" placeholder="管理员密钥" autocomplete="off" />
  <button class="btn btn-primary" id="loginBtn">登 录</button>
</div>

<!-- 主面板 -->
<div class="session-bar" id="sessionBar" style="display:none">
  <span>会话登录于 <strong id="sessionLoginTime">-</strong></span>
  <span id="sessionCountdown"></span>
  <button class="btn-outline" style="padding:2px 10px;font-size:11px;border-radius:6px;border:1px solid var(--g200);background:white;cursor:pointer;color:var(--g700)" id="logoutBtn">退出登录</button>
</div>

<div class="container" id="mainPanel" style="display:none">
  <div class="stat-row" id="stats">
    <div class="stat-card"><div class="label">总账号数</div><div class="value" id="statTotal">-</div></div>
    <div class="stat-card"><div class="label">平台总积分</div><div class="value" id="statBalance">-</div></div>
    <div class="stat-card"><div class="label">兑换码（未用/总数）</div><div class="value" id="statCodes">-</div></div>
  </div>

  <!-- Tab 导航 -->
  <div class="tab-bar">
    <button class="tab-item active" data-tab="accounts">账号管理</button>
    <button class="tab-item" data-tab="codes">兑换码管理</button>
    <button class="tab-item" data-tab="audit">操作审计</button>
  </div>

  <!-- Tab: 账号管理 -->
  <div class="tab-panel active" id="tabAccounts">
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none">
      <div class="card-header">
        <span>账号列表</span>
        <button class="btn btn-outline btn-sm" id="refreshBtn">刷新</button>
      </div>
      <div class="card-body" style="padding:0">
        <table class="acc-table">
          <thead><tr><th>账号 ID</th><th>当前积分</th><th>创建时间</th><th>手动充值</th></tr></thead>
          <tbody id="accBody"></tbody>
        </table>
        <div class="empty hidden" id="emptyAccounts">暂无任何账号</div>
      </div>
    </div>
  </div>

  <!-- Tab: 兑换码管理 -->
  <div class="tab-panel" id="tabCodes">
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none">
      <div class="card-header">
        <span>批量生成兑换码</span>
        <span style="font-size:12px;color:var(--g400)">生成后通过小红书私信等方式发给付款用户</span>
      </div>
      <div class="card-body">
        <div style="font-size:13px;font-weight:600;color:var(--g700);margin-bottom:8px">选择套餐</div>
        <div class="pkg-row" id="pkgSelector">
          <button class="pkg-btn" data-pts="100" data-name="体验包 ¥9.9">
            <div class="pb-name">体验包</div>
            <div class="pb-price">¥9.9</div>
            <div class="pb-pts">100 积分</div>
          </button>
          <button class="pkg-btn sel" data-pts="400" data-name="基础包 ¥29.9">
            <div class="pb-name">基础包</div>
            <div class="pb-price">¥29.9</div>
            <div class="pb-pts">400 积分</div>
          </button>
          <button class="pkg-btn" data-pts="1200" data-name="旗舰包 ¥79.9">
            <div class="pb-name">旗舰包</div>
            <div class="pb-price">¥79.9</div>
            <div class="pb-pts">1200 积分</div>
          </button>
        </div>
        <div class="gen-row">
          <div class="form-group">
            <div class="form-label">生成数量</div>
            <input class="form-input" id="genCount" type="number" min="1" max="200" value="10" />
          </div>
          <div class="form-group" style="flex:1;min-width:160px">
            <div class="form-label">当前选中套餐</div>
            <div id="selectedPkgDisplay" style="padding:8px 12px;background:var(--pri-l);border:1.5px solid var(--pri);border-radius:8px;font-size:13px;font-weight:700;color:var(--pri);font-family:var(--font-sans)">基础包 ¥29.9 · 400积分</div>
          </div>
          <button class="btn btn-primary" id="genCodesBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
            生成兑换码
          </button>
          <button class="btn btn-outline btn-sm" id="copyCodesBtn" style="display:none">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            复制全部
          </button>
        </div>
        <div class="code-output" id="codeOutput"></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <span>兑换码记录</span>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="codeFilter" style="padding:4px 8px;border:1px solid var(--g200);border-radius:6px;font-size:12px;color:var(--g700)">
            <option value="all">全部</option>
            <option value="unused">未使用</option>
            <option value="used">已使用</option>
          </select>
          <button class="btn btn-outline btn-sm" id="refreshCodesBtn">刷新</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="code-table">
          <thead><tr><th>兑换码</th><th>套餐</th><th>积分</th><th>状态</th><th>使用者</th><th>使用时间</th></tr></thead>
          <tbody id="codesBody"></tbody>
        </table>
        <div class="empty hidden" id="emptyCodes" style="padding:24px;text-align:center;color:var(--g400);font-size:13px">暂无兑换码记录</div>
      </div>
    </div>
  </div>

  <!-- Tab: 操作审计 -->
  <div class="tab-panel" id="tabAudit">
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none">
      <div class="card-header">
        <span>操作审计日志</span>
        <div style="display:flex;gap:8px;align-items:center;font-size:12px;color:var(--g400)">
          记录最近 100 条管理员操作（含登录尝试、充值、生成码等）
          <button class="btn btn-outline btn-sm" id="refreshAuditBtn">刷新</button>
        </div>
      </div>
      <div id="auditStats" style="display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--g100);background:var(--g50)"></div>
      <div style="overflow-x:auto">
        <table class="audit-table">
          <thead><tr><th>时间</th><th>操作</th><th>IP</th><th>详情</th></tr></thead>
          <tbody id="auditBody"></tbody>
        </table>
        <div class="empty hidden" id="emptyAudit" style="padding:24px;text-align:center;color:var(--g400);font-size:13px">暂无审计记录</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const loginWrap=$("loginWrap"),mainPanel=$("mainPanel"),secretInput=$("secretInput"),loginBtn=$("loginBtn");
const accBody=$("accBody"),emptyAccounts=$("emptyAccounts"),refreshBtn=$("refreshBtn");
const statTotal=$("statTotal"),statBalance=$("statBalance"),statCodes=$("statCodes"),toastEl=$("toast");
const pkgSelector=$("pkgSelector"),genCount=$("genCount"),genCodesBtn=$("genCodesBtn"),codeOutput=$("codeOutput"),copyCodesBtn=$("copyCodesBtn");
const codesBody=$("codesBody"),emptyCodes=$("emptyCodes"),refreshCodesBtn=$("refreshCodesBtn"),codeFilter=$("codeFilter");
const auditBody=$("auditBody"),emptyAudit=$("emptyAudit"),refreshAuditBtn=$("refreshAuditBtn"),auditStats=$("auditStats");
const sessionBar=$("sessionBar"),sessionLoginTime=$("sessionLoginTime"),sessionCountdown=$("sessionCountdown"),logoutBtn=$("logoutBtn");

const adminSecretKey="aigc_admin_secret";
const adminLoginTimeKey="aigc_admin_login_time";
// 会话有效期：2小时（毫秒）
const SESSION_TTL = 2 * 60 * 60 * 1000;

let secret=localStorage.getItem(adminSecretKey)||"";
let loginTime=Number(localStorage.getItem(adminLoginTimeKey)||"0");
// 默认选中最常用的基础包 ¥29.9，避免管理员未注意仍在 9.9 状态下误生成错误积分的码
let selectedPkg={pts:400,name:"基础包 ¥29.9"};
let lastGeneratedCodes=[];
let countdownTimer=null;

function showToast(msg,type,dur){
  toastEl.textContent=msg;toastEl.className="toast toast-"+(type||"ok")+" show";
  clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.classList.remove("show"),dur||3000);
}

function shortenId(id){
  if(!id||id.length<=20)return id;
  return id.slice(0,8)+"…"+id.slice(-6);
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

function adminHeaders(){return{"Content-Type":"application/json","x-admin-secret":secret}}

// ── 会话超时管理 ──
function startSessionCountdown(){
  if(countdownTimer)clearInterval(countdownTimer);
  const dt=new Date(loginTime);
  sessionLoginTime.textContent=dt.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
  sessionBar.style.display="flex";
  countdownTimer=setInterval(()=>{
    const remaining=SESSION_TTL-(Date.now()-loginTime);
    if(remaining<=0){
      clearInterval(countdownTimer);
      doLogout("会话已超时（2小时），请重新登录");
      return;
    }
    const mins=Math.floor(remaining/60000);
    const secs=Math.floor((remaining%60000)/1000);
    const txt=`${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")} 后自动退出`;
    sessionCountdown.textContent=txt;
    // 最后10分钟变橙色警告
    if(remaining<10*60*1000)sessionCountdown.className="timeout-warn";
    else sessionCountdown.className="";
  },1000);
}

function doLogout(msg){
  clearInterval(countdownTimer);
  localStorage.removeItem(adminSecretKey);
  localStorage.removeItem(adminLoginTimeKey);
  secret="";loginTime=0;
  mainPanel.style.display="none";
  sessionBar.style.display="none";
  loginWrap.style.display="block";
  secretInput.value="";
  if(msg)showToast(msg,"warn",5000);
  secretInput.focus();
}

logoutBtn.addEventListener("click",()=>doLogout("已退出登录"));

// ── Tab 切换 ──
document.querySelectorAll(".tab-item").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");
    const panel=$("tab"+tab.dataset.tab.charAt(0).toUpperCase()+tab.dataset.tab.slice(1));
    if(panel)panel.classList.add("active");
    if(tab.dataset.tab==="codes")loadCodes();
    if(tab.dataset.tab==="audit")loadAudit();
  });
});

// ── 套餐选择 ──
function updateSelectedPkgDisplay(){
  const el=$("selectedPkgDisplay");
  if(el)el.textContent=`${selectedPkg.name} · ${selectedPkg.pts}积分`;
}
pkgSelector.addEventListener("click",e=>{
  const btn=e.target.closest("[data-pts]");
  if(!btn)return;
  pkgSelector.querySelectorAll(".pkg-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  selectedPkg={pts:Number(btn.dataset.pts),name:btn.dataset.name};
  updateSelectedPkgDisplay();
});

// ── 登录 ──
async function verifyAndEnter(){
  const s=secretInput.value.trim();
  if(!s){secretInput.focus();return}
  try{
    const res=await fetch("/api/admin/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({secret:s})});
    const json=await res.json();
    if(!json.ok){
      // 检查是否被限流
      if(json.error?.code==="TOO_MANY_REQUESTS"){
        showToast(`登录尝试过多，请 ${json.error.retryAfter||900} 秒后再试`,"err",6000);
      }else{
        showToast("密钥错误，请检查后重试","err");
      }
      secretInput.select();return
    }
    secret=s;
    loginTime=Date.now();
    localStorage.setItem(adminSecretKey,s);
    localStorage.setItem(adminLoginTimeKey,String(loginTime));
    loginWrap.style.display="none";mainPanel.style.display="block";
    startSessionCountdown();
    loadAccounts();
  }catch(e){showToast("验证失败，请检查网络","err")}
}

// ── 加载账号 ──
async function loadAccounts(){
  try{
    const [accRes,codeRes]=await Promise.all([
      fetch("/api/admin/accounts",{headers:adminHeaders()}),
      fetch("/api/admin/codes",{headers:adminHeaders()}),
    ]);
    const accJson=await accRes.json();
    const codeJson=await codeRes.json();

    if(!accJson.ok){showToast(accJson.error?.message||"加载失败","err");return}
    const accs=accJson.accounts||[];
    statTotal.textContent=String(accs.length);
    statBalance.textContent=String(accs.reduce((s,a)=>s+a.balance,0));

    if(codeJson.ok&&codeJson.stats){
      statCodes.textContent=`${codeJson.stats.unused} / ${codeJson.stats.total}`;
    }

    if(!accs.length){accBody.innerHTML="";emptyAccounts.classList.remove("hidden");return}
    emptyAccounts.classList.add("hidden");
    accs.sort((a,b)=>b.updatedAt-a.updatedAt);
    accBody.innerHTML=accs.map(a=>{
      const dt=new Date(a.createdAt).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
      return `<tr>
        <td title="${esc(a.accountId)}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-mono);font-size:12px">${esc(shortenId(a.accountId))}</td>
        <td><span class="balance-num">${a.balance}</span></td>
        <td style="color:var(--g400);font-family:var(--font-sans)">${esc(dt)}</td>
        <td style="white-space:nowrap">
          <input class="topup-input" data-acc="${esc(a.accountId)}" type="number" min="1" value="100" />
          <button class="btn btn-ok btn-sm" data-topup="${esc(a.accountId)}">充值</button>
        </td>
      </tr>`;
    }).join("");
  }catch(e){showToast("网络错误","err")}
}

// ── 加载兑换码列表 ──
async function loadCodes(){
  try{
    const res=await fetch("/api/admin/codes",{headers:adminHeaders()});
    const json=await res.json();
    if(!json.ok){showToast("加载失败","err");return}
    const filter=codeFilter.value;
    let codes=json.codes||[];
    if(filter==="unused")codes=codes.filter(c=>!c.used);
    else if(filter==="used")codes=codes.filter(c=>c.used);

    if(json.stats)statCodes.textContent=`${json.stats.unused} / ${json.stats.total}`;

    if(!codes.length){codesBody.innerHTML="";emptyCodes.classList.remove("hidden");return}
    emptyCodes.classList.add("hidden");
    codesBody.innerHTML=codes.map(c=>{
      const dt=c.usedAt?new Date(c.usedAt).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"-";
      return `<tr>
        <td style="font-weight:700;letter-spacing:1px;color:var(--g900)">${esc(c.code)}</td>
        <td style="font-family:var(--font-sans);color:var(--g500)">${esc(c.packageName||"-")}</td>
        <td style="color:var(--pri)">${c.points}</td>
        <td><span class="pill-used ${c.used?"yes":"no"}">${c.used?"已使用":"未使用"}</span></td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.usedBy||"")}">${c.usedBy?esc(shortenId(c.usedBy)):"-"}</td>
        <td style="color:var(--g400);font-family:var(--font-sans)">${esc(dt)}</td>
      </tr>`;
    }).join("");
  }catch(e){showToast("网络错误","err")}
}

// ── 生成兑换码 ──
genCodesBtn.addEventListener("click",async()=>{
  const count=parseInt(genCount.value)||10;
  if(count<1||count>200){showToast("数量需在 1~200 之间","err");return}
  genCodesBtn.disabled=true;genCodesBtn.textContent="生成中…";
  try{
    const res=await fetch("/api/admin/generate-codes",{
      method:"POST",headers:adminHeaders(),
      body:JSON.stringify({packageName:selectedPkg.name,points:selectedPkg.pts,count}),
    });
    const json=await res.json();
    if(!json.ok){showToast(json.error?.message||"生成失败","err");return}
    lastGeneratedCodes=json.codes||[];
    codeOutput.textContent=lastGeneratedCodes.join("\n");
    codeOutput.classList.add("show");
    copyCodesBtn.style.display="inline-flex";
    showToast(`成功生成 ${lastGeneratedCodes.length} 个兑换码（${selectedPkg.name}，${selectedPkg.pts}积分/码）`,"ok",5000);
    if(json.stats)statCodes.textContent=`${json.stats.unused} / ${json.stats.total}`;
  }catch(e){showToast("网络错误","err")}finally{
    genCodesBtn.disabled=false;
    genCodesBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg> 生成兑换码`;
  }
});

// ── 复制全部兑换码 ──
copyCodesBtn.addEventListener("click",async()=>{
  if(!lastGeneratedCodes.length)return;
  try{
    await navigator.clipboard.writeText(lastGeneratedCodes.join("\n"));
    showToast("已复制 "+lastGeneratedCodes.length+" 个兑换码到剪贴板","ok",3000);
  }catch(e){showToast("复制失败，请手动选取","err")}
});

codeFilter.addEventListener("change",loadCodes);
refreshCodesBtn.addEventListener("click",loadCodes);

// ── 账号充值 ──
loginBtn.addEventListener("click",verifyAndEnter);
secretInput.addEventListener("keydown",e=>{if(e.key==="Enter")verifyAndEnter()});
refreshBtn.addEventListener("click",loadAccounts);

accBody.addEventListener("click",async e=>{
  const btn=e.target.closest?.("[data-topup]");
  if(!btn)return;
  const accId=btn.dataset.topup;
  const input=accBody.querySelector(`input[data-acc="${accId}"]`);
  const pts=parseInt(input?.value);
  if(!pts||pts<1){showToast("请输入有效积分数","err");return}
  btn.disabled=true;btn.textContent="充值中…";
  try{
    const res=await fetch("/api/admin/topup",{method:"POST",headers:adminHeaders(),body:JSON.stringify({accountId:accId,points:pts})});
    const json=await res.json();
    if(!json.ok){showToast(json.error?.message||"充值失败","err");return}
    showToast(`已为 ${shortenId(accId)} 充值 ${pts} 积分，当前余额 ${json.balance}`,"ok",4000);
    loadAccounts();
  }catch(e){showToast("网络错误","err")}finally{
    btn.disabled=false;btn.textContent="充值";
  }
});

// ── 加载审计日志 ──
async function loadAudit(){
  try{
    const res=await fetch("/api/admin/audit?limit=100",{headers:adminHeaders()});
    const json=await res.json();
    if(!json.ok){showToast("加载失败","err");return}

    // 统计概览
    const stats=json.stats||{};
    auditStats.innerHTML=Object.entries(stats).map(([action,cnt])=>{
      const cls=action.includes("FAILED")?"badge-err":action.includes("SUCCESS")?"badge-ok":action.includes("TOPUP")||action.includes("CODES")?"badge-info":"badge-warn";
      return `<span class="audit-badge ${cls}" style="padding:3px 10px;font-size:11px;border-radius:999px">${esc(action)}: ${cnt}</span>`;
    }).join("")||"<span style='color:var(--g400);font-size:12px'>暂无操作记录</span>";

    const entries=json.entries||[];
    if(!entries.length){auditBody.innerHTML="";emptyAudit.classList.remove("hidden");return}
    emptyAudit.classList.add("hidden");

    auditBody.innerHTML=entries.map(e=>{
      const dt=new Date(e.timestamp).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const isFail=e.action.includes("FAILED");
      const isOk=e.action.includes("SUCCESS");
      const badgeCls=isFail?"badge-err":isOk?"badge-ok":"badge-info";
      const details=Object.entries(e.details||{}).map(([k,v])=>`${k}=${v}`).join(", ")||"-";
      return `<tr>
        <td style="color:var(--g400);font-family:var(--font-sans);white-space:nowrap">${esc(dt)}</td>
        <td class="action"><span class="audit-badge ${badgeCls}">${esc(e.action)}</span></td>
        <td>${esc(e.ip)}</td>
        <td style="font-family:var(--font-sans);color:var(--g500);font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(details)}">${esc(details)}</td>
      </tr>`;
    }).join("");
  }catch(e){showToast("网络错误","err")}
}

refreshAuditBtn.addEventListener("click",loadAudit);

// ── 自动登录（含会话过期检查） ──
if(secret && loginTime && (Date.now()-loginTime) < SESSION_TTL){
  loginWrap.style.display="none";mainPanel.style.display="block";
  startSessionCountdown();
  loadAccounts();
}else if(secret && loginTime && (Date.now()-loginTime) >= SESSION_TTL){
  // 会话已过期，清除并要求重新登录
  localStorage.removeItem(adminSecretKey);
  localStorage.removeItem(adminLoginTimeKey);
  secret="";loginTime=0;
  showToast("上次会话已过期，请重新登录","warn",4000);
  secretInput.focus();
}else{
  secretInput.focus();
}
</script>
</body>
</html>
